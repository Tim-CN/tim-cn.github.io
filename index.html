<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tim-cn · 个人主页</title>
    <style>
        /* 样式和之前一样，这里省略重复，你可以直接复制之前样式部分 */
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: system-ui, ...; background: linear-gradient(135deg, #f5f7fa 0%, #e9eef3 100%); min-height: 100vh; padding: 2rem 1rem; color: #1e2a3e; }
        .container { max-width: 1000px; margin: 0 auto; }
        .profile-card { background: white; border-radius: 2rem; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .avatar { width: 96px; height: 96px; border-radius: 50%; background: #2c3e66; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; font-size: 3rem; }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .bio { font-size: 1.1rem; line-height: 1.5; color: #2c3e50; margin: 1rem 0; border-left: 4px solid #3b82f6; padding-left: 1.2rem; }
        .contact-links { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.2rem; }
        .contact-links a { color: #3b82f6; text-decoration: none; font-weight: 500; }
        .contact-links a:hover { text-decoration: underline; }
        .projects-section { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .section-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.75rem; }
        h2 { font-size: 1.6rem; font-weight: 600; }
        .refresh-btn { background: #f1f5f9; border: none; padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.85rem; cursor: pointer; font-weight: 500; }
        .refresh-btn:hover { background: #e2e8f0; }
        .subpages-list { display: flex; flex-direction: column; gap: 0.8rem; }
        .project-item { background: #f8fafc; border-radius: 1.2rem; padding: 1rem 1.2rem; display: flex; align-items: center; flex-wrap: wrap; justify-content: space-between; border: 1px solid #e2edf2; }
        .project-item:hover { background: #ffffff; border-color: #cbd5e1; }
        .project-name { font-weight: 600; font-size: 1.1rem; }
        .project-name a { text-decoration: none; color: #0f172a; border-bottom: 1px dashed #94a3b8; }
        .project-name a:hover { color: #2563eb; }
        .project-url { font-size: 0.8rem; font-family: monospace; color: #4b5563; background: #eef2ff; padding: 0.2rem 0.6rem; border-radius: 30px; }
        .loading, .error-msg, .empty-msg { text-align: center; padding: 2rem; }
        .error-msg { color: #b91c1c; background: #fee2e2; border-radius: 1rem; }
        footer { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: #5f6c80; }
    </style>
</head>
<body>
<div class="container">
    <div class="profile-card">
        <div class="avatar">🧑‍💻</div>
        <h1>tim-cn</h1>
        <div class="bio">
            独立开发者 / 很闲的程序员（非正式） / 开源工具作者。<br>
            喜欢折腾各类网页小工具，目前所有项目托管在 GitHub Pages。（因为我没钱租服务器……）<br>
            下方列表由 GitHub Actions 自动生成，每天更新一次。
        </div>
        <div class="contact-links">
            <a href="https://github.com/tim-cn" target="_blank">🐙 GitHub</a>
        </div>
    </div>

    <div class="projects-section">
        <div class="section-header">
            <h2>📦 我的 Pages 子网页</h2>
            <button class="refresh-btn" id="refreshBtn">⟳ 刷新列表</button>
        </div>
        <div id="subpagesContainer">
            <div class="loading">⏳ 加载子网页列表中...</div>
        </div>
    </div>
    <footer>✨ 列表每日自动更新 · 数据来自静态 JSON 文件，无 API 限制</footer>
</div>

<script>
    const container = document.getElementById('subpagesContainer');

    async function loadPagesList() {
        container.innerHTML = '<div class="loading">⏳ 读取列表...</div>';
        try {
            // 直接读取仓库中的 pages-list.json（由 GitHub Actions 生成）
            const response = await fetch('pages-list.json?_=' + Date.now()); // 加时间戳避免缓存
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const pages = await response.json();
            if (!pages.length) {
                container.innerHTML = '<div class="empty-msg">✨ 暂无其他 Pages 子仓库（根主页除外）</div>';
                return;
            }
            renderList(pages);
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="error-msg">❌ 加载失败: ${err.message}<br>请确保已配置 GitHub Actions 生成 pages-list.json</div>`;
        }
    }

    function renderList(pages) {
        const html = `
            <div class="subpages-list">
                ${pages.map(p => `
                    <div class="project-item">
                        <div class="project-name">
                            <a href="${escapeHtml(p.url)}" target="_blank">📁 ${escapeHtml(p.name)}</a>
                            ${p.description ? `<span style="font-size:0.85rem; color:#475569; margin-left:0.8rem;">— ${escapeHtml(p.description)}</span>` : ''}
                        </div>
                        <div class="project-url">${escapeHtml(p.url)}</div>
                    </div>
                `).join('')}
            </div>
        `;
        container.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('refreshBtn').addEventListener('click', () => loadPagesList());
    loadPagesList();
</script>
</body>
</html>
